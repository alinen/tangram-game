<!DOCTYPE html>
<html>

<head>
  <script src="jspsych/dist/jspsych.js"></script>
  <link rel="stylesheet" href="jspsych/dist/jspsych.css">
  <script src="jspsych/dist/plugin-survey-likert.js"></script>
  <script src="jspsych/dist/plugin-html-slider-response.js"></script>
  <script src="jspsych/dist/plugin-video-keyboard-response.js"></script>
  <script src="jspsych/dist/plugin-video-button-response.js"></script>
  <script src="jspsych/dist/plugin-fullscreen.js"></script>
  <script src="jspsych/dist/plugin-html-button-response.js"></script>
  <script src="jspsych/dist/extension-record-video.js"></script>
  <script src="jspsych/dist/plugin-initialize-microphone.js"></script>
  <script src="jspsych/dist/plugin-html-audio-response.js"></script>
  <script src="jspsych/dist/plugin-call-function.js"></script>
  <script src="jspsych/dist/plugin-survey-multi-choice.js"></script>
  <script src="jspsych/dist/plugin-survey-html-form.js"></script>
  <script src="https://unpkg.com/@jspsych-contrib/plugin-pipe"></script>
  <script src="https://unpkg.com/@jspsych-contrib/plugin-tangram-game"></script>
  <style>
    .fit-video video {
      width: 80vw;
      height: 75vh;
      object-fit: contain;
      display: block;
      margin: 0 auto;
    }
      .jspsych-btn {
      font-size: 24px !important;
      padding: 16px 40px !important;
      border-radius: 10px !important;
    }
  </style>
</head>

<body></body>

<script>
  var jsPsych = initJsPsych({
    on_data_update: function (data) {
      var currentData = jsPsych.data.get().json();
      localStorage.setItem('NEST-Pilot_partial_data', currentData);
    },

    on_interaction_data_update: function (data) {
      // if participant exits fullscreen
      if (data.event === 'fullscreenexit') {
        if (document.querySelector('#fullscreen-warning')) return;

        const warning = document.createElement('div');
        warning.id = 'fullscreen-warning';

        // return to fullscreen message
        warning.innerHTML = `
            <div style="
              position: fixed;
              bottom: 50px;
              right: 20px;
              background: white;
              border: 2px solid black;
              padding: 20px;
              z-index: 9999;
              box-shadow: 0 4px 10px rgba(0,0,0,0.2);
              text-align: center;
              max-width: 300px;
              font-family: sans-serif;
            ">
              <p>Please return to full-screen.</p>
              <button id="return-fullscreen-btn">
                Return to Full-screen
              </button>
            </div>
          `;

        document.body.appendChild(warning);

        // button logic
        document
          .getElementById('return-fullscreen-btn')
          .addEventListener('click', function () {
            if (document.documentElement.requestFullscreen) {
              document.documentElement.requestFullscreen();
            }
            warning.remove();
          });
      }
    },

    // saving data locally 
    on_finish: function () {
      experiment_finished = true;

      // get interaction data
      var interactionData = jsPsych.data.getInteractionData();
      // Get participant ID 
      var np_id_trial = jsPsych.data.get().filter({ trial_name: "participant_id" }).values()[0];
      // map np_id
      var participantID = np_id_trial ? np_id_trial.response.response : "N/A";
      // map withdraw option
      var keep_trial = jsPsych.data.get().filter({ trial_name: "keep_data_option" }).values()[0];
      var KeepResponse = "N/A"; 
      if (keep_trial && keep_trial.response) {
        var resp = keep_trial.response;
        if (typeof resp === 'string') {
          try { resp = JSON.parse(resp); } catch (e) { }
        }
        KeepResponse = resp.KeepOption || resp.Q0 || "N/A";
      }
       // add session summary 
      jsPsych.data.get().values().unshift({
        trial_type: 'session_summary',
        participant_id: participantID,
        veasy_puzzle_1: selected_veasy[0].data.puzzle_id,
        veasy_puzzle_2: selected_veasy[1].data.puzzle_id,
        hard_puzzle_1: selected_hard[0].data.puzzle_id,
        hard_puzzle_2: selected_hard[1].data.puzzle_id,
        keep_option: KeepResponse
      });

      // add the interaction data to data file
      jsPsych.data.get().push({
        trial_type: 'interaction_summary',
        interaction_history: interactionData.values(),
        total_interactions: interactionData.count()
      });

      // remove partial data if experiment is done
      localStorage.removeItem('NEST-Pilot_partial_data'); 
    }
  });

  // Helper function for the final download
  // run `console.log(localStorage.getItem('NEST_partial_data'));` to retrieve partial data from console log
  function saveFiles() {
    jsPsych.data.get().localSave('json', 'NEST-Pilot-NPID.json');
  }

  // ---------------------------
  // Leave Site warning
  // ---------------------------
  window.addEventListener('beforeunload', (event) => {
    event.preventDefault();
    event.returnValue = '';
  }); 

  // ---------------------------
  // DataPipe set up
  // --------------------------- 
  const subject_id = jsPsych.randomization.randomID(5);
  const experiment_id = "ALDCUHHWe3E5";

  // ---------------------------
  // Participant_ID
  // ---------------------------   
  var np_id = {
    type: jsPsychSurveyHtmlForm,
    preamble: '<p>Please enter your participant ID:</p>',
    html: '<p><input type="text" required id="test-resp-box" name="response" size="10" /></p>',
    button_label: 'Next',
    autocomplete: false,
    autofocus: 'test-resp-box',
    data: { trial_name: "participant_id" },
    on_finish: function (data) {
      jsPsych.data.addProperties({ participant_id: data.response.response });
    }
  };

  // ---------------------------
  // Fullscreen trial
  // ---------------------------
  var enter_fullscreen = {
    type: jsPsychFullscreen,
    fullscreen_mode: true
  };

  // ---------------------------
  // Device Selection
  // ---------------------------
  var device_selection = {
  type: jsPsychVideoButtonResponse, 
  stimulus: ['puzzles/video/puzzle-trackpad-or-mouse.mp4'],
  autoplay: true,
    trial_ends_after_video: false,
    response_ends_trial: true,
    response_allowed_while_playing: true, 
    choices: ['Mouse', 'Trackpad'],
    width: window.innerWidth * 0.6, 
    height: window.innerHeight * 0.3,
    css_classes: ['fit-video'],
    prompt: function() {
      return `
        <style>
          #jspsych-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 90vh;
            padding-top: 5vh;
          }
          #jspsych-video-button-response-stimulus {
            order: 1;
            max-height: 35vh;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
          }
          .device-text-container {
            order: 2;
            margin-top: 30px; 
            text-align: center;
            width: 100%;
          }
          .device-text-container p {
            font-size: 32px; 
            font-weight: 500; 
            margin-bottom: 10px;
          }
          #jspsych-video-button-response-btngroup {
            order: 3;
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 40px;
          }
          #jspsych-video-button-response-btngroup button {
            font-size: 24px;
            padding: 16px 40px;
            border-radius: 10px;
          }
        </style>
        <div class="device-text-container">
          <p>Parent,</p>
          <p>Is your child using a trackpad or mouse during the game today?</p>
        </div> 
      `;
    },
    data: { trial_name: "device_selection" }
  };

// ---------------------------
// Device-specific tutorial video
// ---------------------------
  var device_video = {
    type: jsPsychVideoButtonResponse,
    autoplay: true,
    trial_ends_after_video: false, 
    response_ends_trial: true,
    response_allowed_while_playing: false, 
    choices: ['Next'],
    stimulus: function() {
      var last_trial = jsPsych.data.get().filter({ trial_name: "device_selection" }).values()[0];
      
      // Index 0 is 'Mouse', Index 1 is 'Trackpad'
      if (last_trial && last_trial.response === 0) {
        return ['puzzles/video/puzzle_mouse_tutorial_716.mp4']; 
      } else {
        return ['puzzles/video/puzzle_trackpad_tutorial_716.mp4']; 
      }
    },
    width: window.innerWidth,
    height: window.innerHeight,
    css_classes: ['fit-video']
  }; 


  // ---------------------------
  // Practice Ready Check
  // ---------------------------
  var practice_ready = {
    type: jsPsychHtmlButtonResponse,
    stimulus: `
      <style>
        #jspsych-content {
          height: 100vh;
          display: flex;
          flex-direction: column;
          justify-content: center;
          align-items: center;
        }
      </style>
      <div>
        <p style="font-size: 36px; font-weight: 500; text-align: center; margin-bottom: 20px;">
          Child, are you ready to do some practice puzzles with us?
        </p>
      </div>
    `,
    choices: ['Yes, let\'s go!'],
    data: { trial_name: "practice_ready_check" }
  }; 


  // ---------------------------
  // Task Orientation Videos
  // ---------------------------
  var task_video_1 = {
    type: jsPsychVideoKeyboardResponse,
    autoplay: true,
    trial_ends_after_video: true,
    choices: "NO_KEYS",
    stimulus: ['puzzles/video/puzzle_orientation_video1_630.mp4'],
    width: window.innerWidth,
    height: window.innerHeight,
    css_classes: ['fit-video']
  };

  var task_video_2 = {
    type: jsPsychVideoButtonResponse,
    autoplay: true,
    trial_ends_after_video: false,
    response_ends_trial: true,
    response_allowed_while_playing: false,
    choices: ['Next'],
    stimulus: ['puzzles/video/puzzle_orientation_video2_new.mp4'],
    width: window.innerWidth,
    height: window.innerHeight,
    css_classes: ['fit-video']
  };

  var task_video_3 = {
    type: jsPsychVideoButtonResponse,
    autoplay: true,
    trial_ends_after_video: false,
    response_ends_trial: true,
    response_allowed_while_playing: false,
    choices: ['Next'],
    stimulus: ['puzzles/video/puzzle_orientation_video3_control_new.mp4'],
    width: window.innerWidth,
    height: window.innerHeight,
    css_classes: ['fit-video']
  };

  // store selection outside the trial
  var child_rate_response = null;

// ---------------------------
// Child frustration rating trial
// ---------------------------

var child_rate = {
  type: jsPsychHtmlButtonResponse,
  stimulus: `
    <style>
      #jspsych-content {
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }
      #jspsych-html-button-response-btngroup {
        margin-top: 60px;
      }
      .smiley-img {
        width: 180px;
        height: 180px;
        object-fit: contain;
        cursor: pointer;
        border: 4px solid transparent;
        border-radius: 12px;
        padding: 8px;
        transition: border 0.2s;
      }
      .smiley-img.selected {
        border: 4px solid #f5a623;
      }
        #jspsych-html-button-response-btngroup button {
        font-size: 24px;
        padding: 16px 40px;
        border-radius: 10px;
      }

    </style>
    <div>
      <p style="font-size: 32px; font-weight: 500; margin-bottom: 40px;">
        Child, how frustrated do you feel right now?
      </p>
      <div style="display: flex; justify-content: center; align-items: center; gap: 40px;">
        <img class="smiley-img" src="puzzles/img/1_Very_Happy.png" data-value="1">
        <img class="smiley-img" src="puzzles/img/2_A_Little_Happy.png" data-value="2">
        <img class="smiley-img" src="puzzles/img/A_Little_Frustrated_1.jpg" data-value="3">
        <img class="smiley-img" src="puzzles/img/4_Very_Frustrated.png" data-value="4">
      </div>
    </div>
  `,
  choices: ['Next'],
  on_load: function() {
    child_rate_response = null; 


    const nextButton = document.querySelector('#jspsych-html-button-response-btngroup button');
    if (nextButton) {
      nextButton.disabled = true;
    }

  document.querySelectorAll('.smiley-img').forEach(function(img) {
      img.addEventListener('click', function() {
        document.querySelectorAll('.smiley-img').forEach(i => i.classList.remove('selected'));
        this.classList.add('selected');
        child_rate_response = parseInt(this.getAttribute('data-value'));

        if (nextButton) {
          nextButton.disabled = false;
        }
      });
    });
  }, 

  on_finish: function(data) {
    data.smiley_response = child_rate_response;
  },
  data: { trial_name: "child_rate" }
}; 

  // ---------------------------
  // Tutorials
  // ---------------------------
  var tutorial1 = {
    type: jsPsychTangram,
    svg: "puzzles/puzzle-practice-triangle.svg",
    interactionSound: "puzzles/tap.mp3",
    successSound: "puzzles/win_applaud.mp3",
    failureSound: "puzzles/lose_buzz.mp3",
    successMessage: "You did it! :)",
    failureMessage: "Time is up! :(",
    duration: 10800,
    data: { trial_name: "tutorial2", difficulty: "tutorial", puzzle_id: "puzzle-practice-triangle" }
  };
  
  var tutorial2 = {
    type: jsPsychTangram,
    svg: "puzzles/puzzle-letter.svg",
    interactionSound: "puzzles/tap.mp3",
    successSound: "puzzles/win_applaud.mp3",
    failureSound: "puzzles/lose_buzz.mp3",
    successMessage: "You did it! :)",
    failureMessage: "Time is up! :(",
    duration: 10800,
    data: { trial_name: "tutorial3", difficulty: "tutorial", puzzle_id: "puzzle-letter" }
  };

// ---------------------------
  // Hard/Very Easy puzzle pool
  // ---------------------------
  var puzzles = [
    {
      type: jsPsychTangram,
      svg: "puzzles/puzzle-lamp.svg",
      interactionSound: "puzzles/tap.mp3",
      successSound: "puzzles/win_applaud.mp3",
      failureSound: "puzzles/lose_buzz.mp3",
      successMessage: "You did it! :)",
      failureMessage: "Time is up! :(",
      duration: 90,
      data: { trial_name: "veasy_puzzle", difficulty: "veasy", puzzle_id: "puzzle-lamp" }
    },
    {
      type: jsPsychTangram,
      svg: "puzzles/puzzle-snail.svg",
      interactionSound: "puzzles/tap.mp3",
      successSound: "puzzles/win_applaud.mp3",
      failureSound: "puzzles/lose_buzz.mp3",
      successMessage: "You did it! :)",
      failureMessage: "Time is up! :(",
      duration: 90,
      data: { trial_name: "veasy_puzzle", difficulty: "veasy", puzzle_id: "puzzle-snail" }
    },
    {
      type: jsPsychTangram,
      svg: "puzzles/puzzle-incomplete-square.svg",
      interactionSound: "puzzles/tap.mp3",
      successSound: "puzzles/win_applaud.mp3",
      failureSound: "puzzles/lose_buzz.mp3",
      successMessage: "You did it! :)",
      failureMessage: "Time is up! :(",
      duration: 60,
      data: { trial_name: "hard_puzzle", difficulty: "hard", puzzle_id: "puzzle-incomplete-square" }
    },
    {
      type: jsPsychTangram,
      svg: "puzzles/puzzle-pinwheel.svg",
      interactionSound: "puzzles/tap.mp3",
      successSound: "puzzles/win_applaud.mp3",
      failureSound: "puzzles/lose_buzz.mp3",
      successMessage: "You did it! :)",
      failureMessage: "Time is up! :(",
      duration: 60,
      data: { trial_name: "hard_puzzle", difficulty: "hard", puzzle_id: "puzzle-pinwheel" }
    }
  ]; 

  var selected_veasy = [puzzles[0], puzzles[1]];
  var selected_hard = [puzzles[2], puzzles[3]]; 

  // ---------------------------
  // Helper: build dynamic puzzle image HTML for feedback
  // ---------------------------
  function puzzleImgSrc(puzzle_id) {
    if (puzzle_id === "puzzle-music-note") {
      return `puzzles/img/puzzle-music-note.png`;
    }
    return `puzzles/img/${puzzle_id}-img.png`;
  }

  
  function puzzleImagesHTML(id1, id2, id3, id4) {
    const imgStyle = `max-width:180px; max-height:180px; border:3px solid #ccc; border-radius:12px; padding:10px; background:#f9f9f9;`;
    return `
      <div style="display:flex; justify-content:center; align-items:center; gap:80px; margin: 30px auto;">
      <div style="display:flex; gap:15px;">
        <img src="${puzzleImgSrc(id1)}" style="${imgStyle}">
        <img src="${puzzleImgSrc(id2)}" style="${imgStyle}">
      </div>
      <div style="display:flex; gap:15px;">
        <img src="${puzzleImgSrc(id3)}" style="${imgStyle}">
        <img src="${puzzleImgSrc(id4)}" style="${imgStyle}">
      </div>
    </div>
  `;
} 

  // ---------------------------
  // Feedback trials
  // ---------------------------
  var feedback_intro = {
    type: jsPsychVideoKeyboardResponse,
    autoplay: true,
    trial_ends_after_video: true,
    choices: "NO_KEYS",
    stimulus: ['puzzles/video/puzzle-feedback-intro-630.mp4'],
    width: window.innerWidth,
    height: window.innerHeight,
    css_classes: ['fit-video']
  };

  // ---------------------------
  // Child feedback trial
  // ---------------------------
  var feedback_child = {
    type: jsPsychVideoButtonResponse,
    autoplay: true,
    trial_ends_after_video: false,
    response_ends_trial: true,
    response_allowed_while_playing: true,
    enable_button_after: 12000, 
    choices: ['Next'],
    stimulus: ['puzzles/video/puzzle-feedback-question1-630.mp4'],
    data: { trial_name: "feedback_child" },
    width: window.innerWidth * 0.7,
    height: window.innerHeight * 0.4,
    css_classes: ['fit-video'],
    prompt: function() {
      return `
        <style>
          #jspsych-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 95vh;
            padding-top: 5vh;
          }
          #jspsych-video-button-response-stimulus {
            order: 1;
            max-height: 45vh;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
          }
          .custom-text-container {
            order: 2;
            margin-top: 30px; 
            text-align: center;
            width: 100%;
          }
          .custom-text-container p {
            font-size: 26px;
            font-weight: 500;
            line-height: 1.8;
            margin: 0 0 12px 0;
          }
          #jspsych-video-button-response-btngroup {
            order: 3;
            margin-top: 40px;
          }
        </style>
        <div class="custom-text-container">
          <p>Parent and child, how do you feel about the puzzle task?</p>
          <p>Is there anything you think we should change?</p>
          <p style="color: #d9534f; margin-top: 20px; font-weight: bold;">Child, please talk first.</p>
        </div> 
      `;
    }
  }; 

  // ---------------------------
  // Parent feedback trial
  // ---------------------------
  var feedback_parent = {
    type: jsPsychVideoButtonResponse,
    autoplay: false, 
    trial_ends_after_video: false,
    response_ends_trial: true,
    response_allowed_while_playing: true,
    choices: ['Next'],
    stimulus: ['puzzles/video/puzzle-feedback-question1-630.mp4'],
    data: { trial_name: "feedback_parent" },
    width: window.innerWidth * 0.7,
    height: window.innerHeight * 0.4,
    css_classes: ['fit-video'],
    prompt: function() {
      return `
        <style>
          #jspsych-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 95vh;
            padding-top: 5vh;
          }
          #jspsych-video-button-response-stimulus {
            order: 1;
            max-height: 45vh;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
          }
          .custom-text-container {
            order: 2;
            margin-top: 30px; 
            text-align: center;
            width: 100%;
          }
          .custom-text-container p {
            font-size: 26px;
            font-weight: 500;
            line-height: 1.8;
            margin: 0 0 12px 0;
          }
          #jspsych-video-button-response-btngroup {
            order: 3;
            margin-top: 40px;
          }
        </style>
        <div class="custom-text-container">
          <p>Parent and child, how do you feel about the puzzle task?</p>
          <p>Is there anything you think we should change?</p>
          <p style="color: #007bff; margin-top: 20px; font-weight: bold;">Parent, you can talk now.</p>
        </div> 
      `;
    }
  }; 

  // ---------------------------
  // Feedback ends
  // ---------------------------    
  var feedback_end = {
    type: jsPsychVideoButtonResponse,
    autoplay: true,
    trial_ends_after_video: false,
    response_ends_trial: true,
    response_allowed_while_playing: false,
    choices: ['Next'],
    stimulus: ['puzzles/video/puzzle-feedback-end.mp4'],
    width: window.innerWidth,
    height: window.innerHeight,
    css_classes: ['fit-video']
  };

// ---------------------------
  // Keep data & recording withdraw
  // ---------------------------
  var keep_option = {
    type: jsPsychSurveyMultiChoice,
    questions: [
      {
        prompt: `<style>
            #jspsych-content {
              height: 100vh;
              display: flex;
              flex-direction: column;
              justify-content: center;
              align-items: center;
              text-align: center;
              padding: 40px;
              }
              .jspsych-survey-multi-choice-options {
              text-align: center;
              margin-top: 20px;
              display: flex;
              justify-content: center;
              gap: 40px;
            }
            .jspsych-btn {
              display: block;
              margin: 30px auto 0 auto;
              text-align: center;
            }
          </style>
          <div>
            <p style="font-size: 24px; margin-bottom: 20px;">
                  Can we keep your screen/audio recording of your study session?
            </p>
            <p style="font-size: 24px; margin-bottom: 20px;">
                  If you select 'No', it will then be deleted by the study team, and no one will review your screen/audio recording.
            </p>
          </div>`,
        name: 'KeepOption',
        options: ['Yes', 'No'],
        required: true
      }
    ],
    button_label: 'Next',
    data: { trial_name: "keep_data_option" }
  };

  // ---------------------------
  // Exit fullscreen
  // ---------------------------
  var exit_fullscreen = {
    type: jsPsychFullscreen,
    fullscreen_mode: false,
    delay_after: 0
  }; 

  // ---------------------------
  // DataPipe upload trials
  // ---------------------------
  var save_json_to_datapipe = {
    type: jsPsychPipe,
    action: "save",
    experiment_id: experiment_id,
    filename: `${subject_id}_data.json`,
    data_string: () => jsPsych.data.get().json()
  };

 
  // ---------------------------
  // Final full timeline
  // ---------------------------
  var full_timeline = [
    np_id,
    enter_fullscreen,
    task_video_1,
    child_rate, 
    task_video_2, 
    device_selection, 
    device_video, 
    practice_ready,
    tutorial1,
    tutorial2,
    task_video_3,
    puzzles[0], 
    child_rate,
    puzzles[1], 
    child_rate,
    puzzles[2], 
    child_rate,
    puzzles[3], 
    child_rate, 
    feedback_intro,
    feedback_child, 
    feedback_parent,
    keep_option,
    exit_fullscreen,
    save_json_to_datapipe
  ];

  jsPsych.run(full_timeline);
</script>

</html>
