<!DOCTYPE html>
<html>

<head>
  <script src="jspsych/dist/jspsych.js"></script>
  <link rel="stylesheet" href="jspsych/dist/jspsych.css">
  <script src="jspsych/dist/plugin-survey-likert.js"></script>
  <script src="jspsych/dist/plugin-html-slider-response.js"></script>
  <script src="jspsych/dist/plugin-video-keyboard-response.js"></script>
  <script src="jspsych/dist/plugin-video-button-response.js"></script>
  <script src="jspsych/dist/plugin-fullscreen.js"></script>
  <script src="jspsych/dist/plugin-html-button-response.js"></script>
  <script src="jspsych/dist/extension-record-video.js"></script>
  <script src="jspsych/dist/plugin-initialize-microphone.js"></script>
  <script src="jspsych/dist/plugin-html-audio-response.js"></script>
  <script src="jspsych/dist/plugin-call-function.js"></script>
  <script src="jspsych/dist/plugin-survey-multi-choice.js"></script>
  <script src="jspsych/dist/plugin-survey-html-form.js"></script>

  <style>
    .fit-video video {
      width: 80vw;
      height: 75vh;
      object-fit: contain;
      display: block;
      margin: 0 auto;
    }

<body></body>

<script>
  var jsPsych = initJsPsych({
    on_data_update: function (data) {
      var currentData = jsPsych.data.get().json();
      localStorage.setItem('NEST-Pilot_partial_data', currentData);
    },

    on_interaction_data_update: function (data) {
      // if participant exits fullscreen
      if (data.event === 'fullscreenexit') {
        if (document.querySelector('#fullscreen-warning')) return;

        const warning = document.createElement('div');
        warning.id = 'fullscreen-warning';

        // return to fullscreen message
        warning.innerHTML = `
            <div style="
              position: fixed;
              bottom: 50px;
              right: 20px;
              background: white;
              border: 2px solid black;
              padding: 20px;
              z-index: 9999;
              box-shadow: 0 4px 10px rgba(0,0,0,0.2);
              text-align: center;
              max-width: 300px;
              font-family: sans-serif;
            ">
              <p>Please return to full-screen.</p>
              <button id="return-fullscreen-btn">
                Return to Full-screen
              </button>
            </div>
          `;

        document.body.appendChild(warning);

        // button logic
        document
          .getElementById('return-fullscreen-btn')
          .addEventListener('click', function () {
            if (document.documentElement.requestFullscreen) {
              document.documentElement.requestFullscreen();
            }
            warning.remove();
          });
      }
    },

    // saving data locally 
    on_finish: function () {
      experiment_finished = true;

      // get interaction data
      var interactionData = jsPsych.data.getInteractionData();
      // Get participant ID 
      var np_id_trial = jsPsych.data.get().filter({ trial_name: "participant_id" }).values()[0];
      // map np_id
      var participantID = np_id_trial ? np_id_trial.response.response : "N/A";
      var currentBlockOrder = np_id_trial && np_id_trial.block_order ? np_id_trial.block_order : "N/A";
      // map block order
      var blockOrderValues = jsPsych.data.get().select('block_order').values;
      var currentBlockOrder = blockOrderValues.find(val => val !== undefined) || "N/A";
      // map version
      var versionValues = jsPsych.data.get().select('version').values;
      var currentVersion = versionValues.find(val => val !== undefined) || "N/A";
      // map withdraw option
      var keep_trial = jsPsych.data.get().filter({ trial_name: "keep_data_option" }).values()[0];
      var KeepResponse = "N/A"; 
      if (keep_trial && keep_trial.response) {
        var resp = keep_trial.response;
        if (typeof resp === 'string') {
          try { resp = JSON.parse(resp); } catch (e) { }
        }
        KeepResponse = resp.KeepOption || resp.Q0 || "N/A";
      }
       // add session summary 
      jsPsych.data.get().values().unshift({
        trial_type: 'session_summary',
        participant_id: participantID,
        block_order: currentBlockOrder,
        version: currentVersion,
        easy_puzzle_1: currentVersion === "1" ? "puzzle-cat" : "puzzle-fish",
        easy_puzzle_2: currentVersion === "1" ? "puzzle-rocket" : "puzzle-runman",
        hard_puzzle_1: currentVersion === "1" ? "puzzle-hexagon" : "puzzle-heart",
        hard_puzzle_2: currentVersion === "1" ? "puzzle-square" : "puzzle-pinwheel",
        keep_option: KeepResponse
      });

      // add the interaction data to data file
      jsPsych.data.get().push({
        trial_type: 'interaction_summary',
        interaction_history: interactionData.values(),
        total_interactions: interactionData.count()
      });

      // remove partial data if experiment is done
      localStorage.removeItem('NEST-Pilot_partial_data');
      saveFiles();
    }
  });

  // Helper function for the final download
  // run `console.log(localStorage.getItem('NEST_partial_data'));` to retrieve partial data from console log
  function saveFiles() {
    jsPsych.data.get().localSave('json', 'NEST-Pilot-NPID.json');
  }

  // ---------------------------
  // Leave Site warning
  // ---------------------------
  window.addEventListener('beforeunload', (event) => {
    event.preventDefault();
    event.returnValue = '';
  });

  // ---------------------------
  // Participant_ID
  // ---------------------------   
  var np_id = {
    type: jsPsychSurveyHtmlForm,
    preamble: '<p>Please enter your participant ID:</p>',
    html: '<p><input type="text" required id="test-resp-box" name="response" size="10" /></p>',
    button_label: 'Next',
    autocomplete: false,
    autofocus: 'test-resp-box',
    data: { trial_name: "participant_id" },
    on_finish: function (data) {
      jsPsych.data.addProperties({ participant_id: data.response.response });
    }
  };

  // ---------------------------
  // Block Order & Version Select
  // ---------------------------
  var block_order_select = {
    type: jsPsychHtmlButtonResponse,
    stimulus: '<p>Please select the block order for this session:</p>',
    choices: ['A', 'B'],
    on_finish: function (data) {
      var block_order = data.response === 0 ? "EEHH" : "HHEE";
      jsPsych.data.addProperties({ block_order: block_order });
    }
  };

  var version_select = {
    type: jsPsychHtmlButtonResponse,
    stimulus: '<p>Please select the game version for this session:</p>',
    choices: ['Version 1', 'Version 2'],
    on_finish: function (data) {
      var version = data.response === 0 ? "1" : "2";
      jsPsych.data.addProperties({ version: version });
    }

  // Fullscreen trial
  // ---------------------------
  var enter_fullscreen = {

    fullscreen_mode: true

  // ---------------------------

  // ---------------------------

    height: window.innerHeight,
    css_classes: ['fit-video']

  var task_video_2 = {
    type: jsPsychVideoButtonResponse,
    autoplay: true,
    trial_ends_after_video: false,

    height: window.innerHeight,

    type: jsPsychVideoButtonResponse,
    autoplay: true,
    trial_ends_after_video: false,
    response_ends_trial: true,

  var easy_v1_2 = { type: jsPsychTangram, svg: "puzzles/puzzle-rocket.svg", interactionSound: "puzzles/tap.mp3", successSound: "puzzles/win_applaud.mp3", failureSound: "puzzles/lose_buzz.mp3", successMessage: "You did it! :)", failureMessage: "Time is up! :(", duration: 60, data: { trial_name: "easy_puzzle", difficulty: "easy", puzzle_id: "puzzle-rocket" } };

  var hard_v1_2 = { type: jsPsychTangram, svg: "puzzles/puzzle-square.svg", interactionSound: "puzzles/tap.mp3", successSound: "puzzles/win_applaud.mp3", failureSound: "puzzles/lose_buzz.mp3", successMessage: "You did it! :)", failureMessage: "Time is up! :(", duration: 120, data: { trial_name: "hard_puzzle", difficulty: "hard", puzzle_id: "puzzle-square" } };

  var easy_v2_1 = { type: jsPsychTangram, svg: "puzzles/puzzle-fish.svg", interactionSound: "puzzles/tap.mp3", successSound: "puzzles/win_applaud.mp3", failureSound: "puzzles/lose_buzz.mp3", successMessage: "You did it! :)", failureMessage: "Time is up! :(", duration: 60, data: { trial_name: "easy_puzzle", difficulty: "easy", puzzle_id: "puzzle-fish" } };
  var easy_v2_2 = { type: jsPsychTangram, svg: "puzzles/puzzle-runman.svg", interactionSound: "puzzles/tap.mp3", successSound: "puzzles/win_applaud.mp3", failureSound: "puzzles/lose_buzz.mp3", successMessage: "You did it! :)", failureMessage: "Time is up! :(", duration: 60, data: { trial_name: "easy_puzzle", difficulty: "easy", puzzle_id: "puzzle-runman" } };
  var hard_v2_1 = { type: jsPsychTangram, svg: "puzzles/puzzle-heart.svg", interactionSound: "puzzles/tap.mp3", successSound: "puzzles/win_applaud.mp3", failureSound: "puzzles/lose_buzz.mp3", successMessage: "You did it! :)", failureMessage: "Time is up! :(", duration: 120, data: { trial_name: "hard_puzzle", difficulty: "hard", puzzle_id: "puzzle-heart" } };
  var hard_v2_2 = { type: jsPsychTangram, svg: "puzzles/puzzle-pinwheel.svg", interactionSound: "puzzles/tap.mp3", successSound: "puzzles/win_applaud.mp3", failureSound: "puzzles/lose_buzz.mp3", successMessage: "You did it! :)", failureMessage: "Time is up! :(", duration: 120, data: { trial_name: "hard_puzzle", difficulty: "hard", puzzle_id: "puzzle-pinwheel" } };


  // ---------------------------
  // Build main puzzle timelines (Conditional Nodes)
  // ---------------------------
  
  // Version 1 Nodes
  var v1_eehh_node = {
    timeline: [easy_v1_1, child_rate, easy_v1_2, child_rate, hard_v1_1, child_rate, hard_v1_2, child_rate],
    conditional_function: function () {
      return jsPsych.data.get().select('block_order').values[0] === "EEHH" && jsPsych.data.get().select('version').values[0] === "1";
    }
  };

  var v1_hhee_node = {
    timeline: [hard_v1_1, child_rate, hard_v1_2, child_rate, easy_v1_1, child_rate, easy_v1_2, child_rate],
    conditional_function: function () {
      return jsPsych.data.get().select('block_order').values[0] === "HHEE" && jsPsych.data.get().select('version').values[0] === "1";
    }
  };

  // Version 2 Nodes
  var v2_eehh_node = {
    timeline: [easy_v2_1, child_rate, easy_v2_2, child_rate, hard_v2_1, child_rate, hard_v2_2, child_rate],
    conditional_function: function () {
      return jsPsych.data.get().select('block_order').values[0] === "EEHH" && jsPsych.data.get().select('version').values[0] === "2";
    }
  };

  var v2_hhee_node = {
    timeline: [hard_v2_1, child_rate, hard_v2_2, child_rate, easy_v2_1, child_rate, easy_v2_2, child_rate],
    conditional_function: function () {
      return jsPsych.data.get().select('block_order').values[0] === "HHEE" && jsPsych.data.get().select('version').values[0] === "2";
    }
  };

  // ---------------------------
  // Helper: build dynamic puzzle image HTML for feedback
  // ---------------------------
  function puzzleImgSrc(puzzle_id) {
    if (puzzle_id === "puzzle-music-note") {
      return `puzzles/img/puzzle-music-note.png`;
    }
    return `puzzles/img/${puzzle_id}-img.png`;
  }

  function puzzleImagesHTML(id1, id2) {
    return `
        <div style="display:flex; justify-content:center; align-items:center; gap:60px; margin: 30px auto;">
          <img src="${puzzleImgSrc(id1)}" style="max-width:180px; max-height:180px; border:3px solid #ccc; border-radius:12px; padding:10px; background:#f9f9f9;">
          <img src="${puzzleImgSrc(id2)}" style="max-width:180px; max-height:180px; border:3px solid #ccc; border-radius:12px; padding:10px; background:#f9f9f9;">
        </div>
      `;
  };

  // ---------------------------
  // Feedback trials
  // ---------------------------
  var feedback_intro = {
    type: jsPsychVideoKeyboardResponse,
    autoplay: true,
    trial_ends_after_video: true,
    choices: "NO_KEYS",
    stimulus: ['puzzles/video/puzzle-feedback-intro.mp4'],
    width: window.innerWidth,
    height: window.innerHeight,
    css_classes: ['fit-video']
  };

  // ---------------------------
  // Child feedback trials
  // ---------------------------
  var child_feedback1 = {
    type: jsPsychVideoButtonResponse,
    autoplay: true,
    trial_ends_after_video: false,
    response_ends_trial: true,
    response_allowed_while_playing: true,
    enable_button_after: 8000,
    choices: ['Next'],
    stimulus: ['puzzles/video/puzzle-feedback-child-1.mp4'],
    data: { trial_name: "child_feedback1" },
    width: window.innerWidth * 0.6,
    height: window.innerHeight * 0.4,
    css_classes: ['fit-video'],
    prompt: function() {
      var version = jsPsych.data.get().select('version').values[0];
      var id1 = version === "1" ? "puzzle-cat" : "puzzle-fish";
      var id2 = version === "1" ? "puzzle-rocket" : "puzzle-runman";

      return `
        <style>
          #jspsych-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 95vh;
            padding-top: 5vh;
          }
          #jspsych-video-button-response-stimulus {
            order: 1;
            max-height: 30vh;
            width: 120%;
          }
          .custom-text-container {
            order: 2;
            margin-top: 25px;
            text-align: center;
          }
          .puzzle-images {
            margin-top: 20px;
          }
          #jspsych-video-button-response-btngroup {
            order: 3;
            margin-top: 40px;
            margin-bottom: 0px;
          }
        </style>
        <div class="custom-text-container">
          <p style="font-size: 36px; font-weight: 500;margin:0;">
            Hi friend, how did you feel when working on these puzzles?
          </p>
          <div class="puzzle-images">
            ${puzzleImagesHTML(id1, id2)}
          </div>
        </div>
      `;
    }
  };

  var child_feedback2 = {
    type: jsPsychVideoButtonResponse,
    autoplay: true,
    trial_ends_after_video: false,
    response_ends_trial: true,
    response_allowed_while_playing: true,
    enable_button_after: 7000,
    choices: ['Next'],
    stimulus: ['puzzles/video/puzzle-feedback-child-2.mp4'],
    data: { trial_name: "child_feedback2" },
    width: window.innerWidth * 0.6,
    height: window.innerHeight * 0.4,
    css_classes: ['fit-video'],
    prompt: function() {
      var version = jsPsych.data.get().select('version').values[0];
      var id1 = version === "1" ? "puzzle-hexagon" : "puzzle-heart";
      var id2 = version === "1" ? "puzzle-square" : "puzzle-pinwheel";

      return `
        <style>
          #jspsych-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 95vh;
            padding-top: 5vh;
          }
          #jspsych-video-button-response-stimulus {
            order: 1;
            max-height: 30vh;
            width: auto;
          }
          .custom-text-container {
            order: 2;
            margin-top: 25px;
            text-align: center;
          }
          .puzzle-images {
            margin-top: 20px;
          }
          #jspsych-video-button-response-btngroup {
            order: 3;
            margin-top: 40px;
            margin-bottom: 0px;
          }
        </style>
        <div class="custom-text-container">
          <p style="font-size: 36px; margin: 0;">
            How did you feel when working on these puzzles?
          </p>
          <div class="puzzle-images">
            ${puzzleImagesHTML(id1, id2)}
          </div>
        </div>
      `;
    }
  };

  var child_feedback3 = {
    type: jsPsychVideoButtonResponse,
    autoplay: true,
    trial_ends_after_video: false,
    response_ends_trial: true,
    response_allowed_while_playing: true,
    enable_button_after: 9000,
    choices: ['Next'],
    stimulus: ['puzzles/video/puzzle-feedback-child-3.mp4'],
    data: { trial_name: "child_feedback3" },
    width: window.innerWidth * 0.6,
    height: window.innerHeight * 0.4,
    css_classes: ['fit-video'],
    prompt: `
      <style>
        #jspsych-content {
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: flex-start;
          height: 95vh;
          padding-top: 5vh;
        }
        #jspsych-video-button-response-stimulus {
          order: 1;
          max-height: 30vh; 
          width: auto;
        }
        .custom-text-container {
          order: 2;
          margin-top: 25px;
          text-align: center;
          width: 120%;
        }
        .custom-text-container p {
          font-size: 32px;
          font-weight: 400;
          line-height:  1.3;
          margin: 0;
        }
        #jspsych-video-button-response-btngroup {
          order: 3;
          margin-top: 25px;
          margin-bottom: 0px;
        }
      </style>
      <div class="custom-text-container" style="text-align: center;">
        <p>
          When playing the puzzle game, how easy was it to move the pieces?
        </p>
      </div>
    `
  };

  var child_feedback4 = {
    type: jsPsychVideoButtonResponse,
    autoplay: true,
    trial_ends_after_video: false,
    response_ends_trial: true,
    response_allowed_while_playing: true,
    enable_button_after: 6000,
    choices: ['Next'],
    stimulus: ['puzzles/video/puzzle-feedback-child-4.mp4'],
    data: { trial_name: "child_feedback4" },
    width: window.innerWidth * 0.6,
    height: window.innerHeight * 0.4,
    css_classes: ['fit-video'],
    prompt: `
      <style>
        #jspsych-content {
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: flex-start;
          height: 95vh;
          padding-top: 5vh;
        }
        #jspsych-video-button-response-stimulus {
          order: 1;
          max-height: 30vh; 
          width: auto;
        }
        .custom-text-container {
          order: 2;
          margin-top: 25px;
          text-align: center;
          width: 120%;
        }
        .custom-text-container p {
          font-size: 32px;
          font-weight: 400;

        }
        #jspsych-video-button-response-btngroup {

          margin-top: 25px;

        }
      </style>
      <div class="custom-text-container" style="text-align: center;">
        <p>
          Was the instruction video helpful?
        </p>
      </div>
    `
  };

  // ---------------------------
  // Parent feedback trials
  // ---------------------------
  var parent_feedback1 = {
    type: jsPsychVideoButtonResponse,
    autoplay: true,
    trial_ends_after_video: false,
    response_ends_trial: true,
    response_allowed_while_playing: true,
    enable_button_after: 20000,
    choices: ['Next'],
    data: { trial_name: "parent_feedback1" },
    stimulus: ['puzzles/video/puzzle-feedback-parent-1.mp4'],
    width: window.innerWidth * 0.6,
    height: window.innerHeight * 0.4,
    css_classes: ['fit-video'],
    prompt: function() {
      var version = jsPsych.data.get().select('version').values[0];
      var id1 = version === "1" ? "puzzle-cat" : "puzzle-fish";
      var id2 = version === "1" ? "puzzle-rocket" : "puzzle-runman";

      return `
        <style>
          #jspsych-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 95vh;
            padding-top: 5vh;
          }
          #jspsych-video-button-response-stimulus {
            order: 1;
            max-height: 30vh; 
            width: auto;
            margin-top: 0px;
          }
          .custom-text-container {
            order: 2;
