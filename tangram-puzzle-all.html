  <script>
var jsPsych = initJsPsych({
    on_data_update: function(data) {
        var currentData = jsPsych.data.get().json();
        localStorage.setItem('NEST-Pilot_partial_data', currentData);
    },

    on_interaction_data_update: function(data) {
        // if participant exits fullscreen
      if (data.event === 'fullscreenexit') {
      if (document.querySelector('#fullscreen-warning')) return;

      const warning = document.createElement('div');
        warning.id = 'fullscreen-warning';

          // return to fullscreen message
          warning.innerHTML = `
            <div style="
              position: fixed;
              bottom: 50px;
              right: 20px;
              background: white;
              border: 2px solid black;
              padding: 20px;
              z-index: 9999;
              box-shadow: 0 4px 10px rgba(0,0,0,0.2);
              text-align: center;
              max-width: 300px;
              font-family: sans-serif;
            ">
              <p>Please return to full-screen.</p>
              <button id="return-fullscreen-btn">
                Return to Full-screen
              </button>
            </div>
          `;

        document.body.appendChild(warning);

        // button logic
        document
          .getElementById('return-fullscreen-btn')
          .addEventListener('click', function() {
              if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
              }
              warning.remove();
          });
        }
      },

     //on_close: function() {
       // Grab all currently collected data
      // var currentData = jsPsych.data.get().json();
          
      // Save partial data locally
     // localStorage.setItem('jspsych_partial_data', currentData);
     // console.log('Partial data saved to localStorage');
     // },

      // saving data locally 
      on_finish: function() {
        experiment_finished = true; 

        // get interaction data
        var interactionData = jsPsych.data.getInteractionData();
        
        // add the interaction data to data file
        jsPsych.data.get().push({
          trial_type: 'interaction_summary',
          interaction_history: interactionData.values(),
          total_interactions: interactionData.count()
        });
        
        // remove partial data if experiment is done
        localStorage.removeItem('NEST_partial_data');
        saveFiles();
      }
    });

    // Helper function for the final download
    function saveFiles() {
      jsPsych.data.get().localSave('json', 'NEST-Pilot-NPID.json');
    }

    // ---------------------------
    // Save Partial Data on Window Close
    // ---------------------------
    // run `console.log(localStorage.getItem('NEST_partial_data'));` to retrieve partial data from console log
    window.addEventListener('beforeunload', (event) => {     
        event.preventDefault();
        event.returnValue = '';
