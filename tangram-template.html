<head>
<style id="tangram-styles">
          html, body {
            margin: 0;
            width: 100%;
            height: 100%;
          }

          #container {
            position: absolute;
            width: 100vw;
            height: 100vh;
          }

          #svgObject, #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
          }

          #overlay {
            pointer-events: none; /* clicks go to SVG */
          }
        </style>
        </head>
<body>
                <div id="container">
          <object id="svg"
                  type="image/svg+xml"
                  >

            <svg
              preserveAspectRatio="xMidYMid meet"
              width="600"
              height="300"
              viewBox="0 0 600 300"
              version="1.1"
              id="svgObject"
              xmlns="http://www.w3.org/2000/svg"
              xmlns:svg="http://www.w3.org/2000/svg">
              <g id="PuzzleLayer" >
                <path
                  style="opacity:1;fill:#ff7676;fill-opacity:1;stroke:none;stroke-width:1.36277"

                  id="T1"
                  />
                <path
                  style="opacity:1;fill:#6265ff;fill-opacity:1;stroke:none;stroke-width:1.36277"

                  id="T2"
                  />
                <path

                  />

                  id="T4"
                  />
                <path
                  style="opacity:1;fill:#66fff4;fill-opacity:1;stroke:none;stroke-width:1.36277"
                  d="M 58.163263,153.52636 H 126.30185 L 92.232554,187.59565 H 24.093973 Z"
                  id="P"
                  />
                <path
                  style="opacity:1;fill:#ad54ff;fill-opacity:1;stroke:none;stroke-width:1.36277"
                  d="m 124.11366,86.437446 34.0693,34.069304 V 52.368146 Z"
                  id="T5"
                  />

              <g

                  id="path4009" />
              </g>
              <g
                id="TimebarLayer"
                style="image-rendering:auto">

                  style="fill:#00b500;fill-opacity:1;stroke:none;stroke-width:2.90695;stroke-dasharray:none;stroke-opacity:1"
